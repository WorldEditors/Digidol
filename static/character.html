<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digidol Character</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        canvas {
            display: block;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
            pointer-events: none;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
        }
        .error {
            color: #ff6b6b;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="loading" id="loading">Loading 3D Character...</div>
    </div>
    <div class="controls">Drag to rotate | Scroll to zoom</div>
    <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
    <script>
        console.log('Script started');

        let scene, camera, renderer, character;
        let targetRotationX = 0, targetRotationY = 0;
        let currentRotationX = 0, currentRotationY = 0;
        let isDragging = false;
        let previousMouseX = 0, previousMouseY = 0;
        let scale = 1;
        let targetScale = 1;
        let mouthMesh, leftEyeGroup, rightEyeGroup, blushLeft, blushRight, leftArm, rightArm;
        let isAnimating = false;
        let emotion = 'neutral';

        function init() {
            console.log('Init called');
            try {
                scene = new THREE.Scene();
                console.log('Scene created');

                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 0.5, 8);
                console.log('Camera created');

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.getElementById('canvas-container').appendChild(renderer.domElement);
                console.log('Renderer created');

                createLights();
                createBackground();
                character = createChibiCharacter();
                scene.add(character);
                console.log('Character created');

                document.getElementById('loading').style.display = 'none';

                setupEventListeners();
                animate();
                console.log('Animation started');
            } catch (e) {
                console.error('Init error:', e);
                document.getElementById('loading').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            }
        }

        function createLights() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(5, 10, 7);
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0x6366f1, 0.4);
            fillLight.position.set(-5, 5, -5);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xf472b6, 0.3);
            rimLight.position.set(0, 5, -10);
            scene.add(rimLight);
        }

        function createBackground() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 300;
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 50;
                positions[i + 1] = (Math.random() - 0.5) * 50;
                positions[i + 2] = (Math.random() - 0.5) * 50 - 20;
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.8 });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        function createChibiCharacter() {
            const group = new THREE.Group();

            const skinColor = 0xffe4c4;
            const hairColor = 0x4a3728;
            const eyeColor = 0x4a90d9;
            const clothColor = 0x6366f1;
            const blushColor = 0xff9999;

            const bodyGeometry = new THREE.SphereGeometry(1.2, 32, 32);
            const bodyMaterial = new THREE.MeshLambertMaterial({ color: clothColor });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = -0.5;
            body.scale.y = 1.2;
            group.add(body);

            const bodyFront = new THREE.Mesh(
                new THREE.SphereGeometry(1.1, 32, 32),
                new THREE.MeshLambertMaterial({ color: clothColor })
            );
            bodyFront.position.set(0, -0.3, 0.3);
            bodyFront.scale.set(0.9, 1, 0.5);
            group.add(bodyFront);

            const collar = new THREE.Mesh(
                new THREE.TorusGeometry(0.6, 0.15, 16, 32, Math.PI),
                new THREE.MeshLambertMaterial({ color: 0xffffff })
            );
            collar.position.set(0, 0.5, 0.5);
            collar.rotation.x = -Math.PI / 4;
            group.add(collar);

            const headGroup = new THREE.Group();
            headGroup.position.y = 1;

            const head = new THREE.Mesh(
                new THREE.SphereGeometry(1.1, 32, 32),
                new THREE.MeshLambertMaterial({ color: skinColor })
            );
            head.scale.set(1, 0.95, 1);
            headGroup.add(head);

            const hairBack = new THREE.Mesh(
                new THREE.SphereGeometry(1.15, 32, 32),
                new THREE.MeshLambertMaterial({ color: hairColor })
            );
            hairBack.position.set(0, 0.1, -0.3);
            hairBack.scale.set(1.1, 1.1, 1.2);
            headGroup.add(hairBack);

            const hairTop = new THREE.Mesh(
                new THREE.SphereGeometry(1.12, 32, 32),
                new THREE.MeshLambertMaterial({ color: hairColor })
            );
            hairTop.position.set(0, 0.5, -0.1);
            hairTop.scale.set(1, 0.6, 1);
            headGroup.add(hairTop);

            for (let i = 0; i < 4; i++) {
                const ahoge = new THREE.Mesh(
                    new THREE.ConeGeometry(0.15, 0.8, 8),
                    new THREE.MeshLambertMaterial({ color: hairColor })
                );
                ahoge.position.set(Math.sin(i * 0.8) * 0.7, 1.3, Math.cos(i * 0.8) * 0.3 - 0.4);
                ahoge.rotation.z = Math.sin(i) * 0.3;
                ahoge.rotation.x = -0.3;
                headGroup.add(ahoge);
            }

            leftEyeGroup = createEye(eyeColor, -0.35, 0.1, 0.85);
            rightEyeGroup = createEye(eyeColor, 0.35, 0.1, 0.85);
            headGroup.add(leftEyeGroup);
            headGroup.add(rightEyeGroup);

            mouthMesh = new THREE.Mesh(
                new THREE.TorusGeometry(0.15, 0.03, 8, 16, Math.PI),
                new THREE.MeshLambertMaterial({ color: 0xff6b6b })
            );
            mouthMesh.position.set(0, -0.2, 1);
            mouthMesh.rotation.x = Math.PI;
            headGroup.add(mouthMesh);

            const blushMaterial = new THREE.MeshBasicMaterial({ color: blushColor, transparent: true, opacity: 0.4 });

            blushLeft = new THREE.Mesh(new THREE.CircleGeometry(0.15, 16), blushMaterial.clone());
            blushLeft.position.set(-0.55, -0.05, 0.9);
            blushLeft.rotation.y = 0.3;
            headGroup.add(blushLeft);

            blushRight = new THREE.Mesh(new THREE.CircleGeometry(0.15, 16), blushMaterial.clone());
            blushRight.position.set(0.55, -0.05, 0.9);
            blushRight.rotation.y = -0.3;
            headGroup.add(blushRight);

            group.add(headGroup);

            leftArm = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.2, 0.8, 8, 16),
                new THREE.MeshLambertMaterial({ color: clothColor })
            );
            leftArm.position.set(-1.5, 0, 0);
            leftArm.rotation.z = Math.PI / 6;
            group.add(leftArm);

            rightArm = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.2, 0.8, 8, 16),
                new THREE.MeshLambertMaterial({ color: clothColor })
            );
            rightArm.position.set(1.5, 0, 0);
            rightArm.rotation.z = -Math.PI / 6;
            group.add(rightArm);

            const handMaterial = new THREE.MeshLambertMaterial({ color: skinColor });
            const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), handMaterial);
            leftHand.position.set(-1.8, -0.6, 0);
            group.add(leftHand);

            const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), handMaterial);
            rightHand.position.set(1.8, -0.6, 0);
            group.add(rightHand);

            const legMaterial = new THREE.MeshLambertMaterial({ color: 0x1e1e2e });
            const leftLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.6, 8, 16), legMaterial);
            leftLeg.position.set(-0.4, -2.2, 0);
            group.add(leftLeg);

            const rightLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.6, 8, 16), legMaterial);
            rightLeg.position.set(0.4, -2.2, 0);
            group.add(rightLeg);

            const shoeMaterial = new THREE.MeshLambertMaterial({ color: 0x1e1e2e });
            const leftShoe = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), shoeMaterial);
            leftShoe.position.set(-0.4, -2.7, 0.1);
            leftShoe.scale.set(1, 0.6, 1.3);
            group.add(leftShoe);

            const rightShoe = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), shoeMaterial);
            rightShoe.position.set(0.4, -2.7, 0.1);
            rightShoe.scale.set(1, 0.6, 1.3);
            group.add(rightShoe);

            const platform = new THREE.Mesh(
                new THREE.CylinderGeometry(1.5, 1.5, 0.2, 32),
                new THREE.MeshStandardMaterial({ color: 0x6366f1, metalness: 0.3, roughness: 0.7 })
            );
            platform.position.y = -2.9;
            group.add(platform);

            return group;
        }

        function createEye(irisColor, x, y, z) {
            const eyeGroup = new THREE.Group();

            const white = new THREE.Mesh(
                new THREE.SphereGeometry(0.22, 32, 32),
                new THREE.MeshLambertMaterial({ color: 0xffffff })
            );
            eyeGroup.add(white);

            const iris = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 32, 32),
                new THREE.MeshLambertMaterial({ color: irisColor })
            );
            iris.position.z = 0.15;
            eyeGroup.add(iris);

            const pupil = new THREE.Mesh(
                new THREE.SphereGeometry(0.08, 16, 16),
                new THREE.MeshLambertMaterial({ color: 0x000000 })
            );
            pupil.position.z = 0.2;
            eyeGroup.add(pupil);

            const highlight = new THREE.Mesh(
                new THREE.SphereGeometry(0.04, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            highlight.position.set(0.03, 0.05, 0.23);
            eyeGroup.add(highlight);

            eyeGroup.position.set(x, y, z);
            return eyeGroup;
        }

        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('wheel', onMouseWheel);
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMouseX = event.clientX;
            previousMouseY = event.clientY;
        }

        function onMouseMove(event) {
            if (isDragging) {
                targetRotationY += (event.clientX - previousMouseX) * 0.01;
                targetRotationX += (event.clientY - previousMouseY) * 0.01;
                targetRotationX = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, targetRotationX));
                previousMouseX = event.clientX;
                previousMouseY = event.clientY;
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseWheel(event) {
            targetScale -= event.deltaY * 0.001;
            targetScale = Math.max(0.5, Math.min(2, targetScale));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateEmotion(newEmotion) {
            if (emotion === newEmotion || isAnimating) return;
            emotion = newEmotion;

            switch (emotion) {
                case 'happy':
                    mouthMesh.visible = false;
                    blushLeft.material.opacity = 0.6;
                    blushRight.material.opacity = 0.6;
                    break;
                case 'sad':
                    mouthMesh.visible = true;
                    mouthMesh.rotation.x = 0;
                    blushLeft.material.opacity = 0.2;
                    blushRight.material.opacity = 0.2;
                    break;
                default:
                    mouthMesh.visible = true;
                    mouthMesh.rotation.x = Math.PI;
                    blushLeft.material.opacity = 0.4;
                    blushRight.material.opacity = 0.4;
            }
        }

        function performAction(action) {
            if (isAnimating) return;
            isAnimating = true;

            setTimeout(() => {
                isAnimating = false;
            }, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);

            currentRotationX += (targetRotationX - currentRotationX) * 0.1;
            currentRotationY += (targetRotationY - currentRotationY) * 0.1;
            scale += (targetScale - scale) * 0.1;

            if (character) {
                character.rotation.x = currentRotationX;
                character.rotation.y = currentRotationY;
                character.scale.set(scale, scale, scale);

                const time = Date.now() * 0.001;
                character.position.y = Math.sin(time * 1.5) * 0.1;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('message', function(event) {
            const data = event.data;
            if (data.type === 'emotion') updateEmotion(data.emotion);
            else if (data.type === 'action') performAction(data.action);
        });

        window.updateCharacterEmotion = updateEmotion;
        window.updateCharacterAction = performAction;

        window.addEventListener('load', init);

        if (document.readyState === 'complete') {
            init();
        } else {
            document.addEventListener('DOMContentLoaded', init);
        }

        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading && loading.style.display !== 'none') {
                console.log('Fallback init triggered');
                init();
            }
        }, 1000);
    </script>
</body>
</html>
